<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Joke Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f4f4f4;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #container {
            background: #fff;
            padding: 32px 26px;
            border-radius: 12px;
            box-shadow: 0 2px 14px 0 rgba(0,0,0,0.05);
            width: 340px;
            text-align: center;
        }
        #setup {
            font-size: 1.2em;
            margin-bottom: 12px;
        }
        #punchline {
            color: #0072dd;
            font-size: 1.1em;
            margin-bottom: 14px;
        }
        button {
            padding: 8px 24px;
            font-size: 1em;
            border-radius: 8px;
            border: none;
            background: #0072dd;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
        }
        button:hover {
            background: #024b99;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Random Joke Generator</h1>
        <div id="setup">Loading joke...</div>
        <div id="punchline"></div>
        <button id="new-joke-btn">Get Another Joke</button>
    </div>

    <script>
        async function fetchJoke() {
            const setupEl = document.getElementById('setup');
            const punchlineEl = document.getElementById('punchline');
            setupEl.textContent = "Loading joke...";
            punchlineEl.textContent = "";
            try {
                const response = await fetch('https://official-joke-api.appspot.com/random_joke');
                if (!response.ok) throw new Error("Network error");
                const data = await response.json();
                setupEl.textContent = data.setup;
                punchlineEl.textContent = data.punchline;
            } catch (e) {
                setupEl.textContent = "Failed to load a joke.";
                punchlineEl.textContent = "Try again.";
            }
        }
        document.getElementById('new-joke-btn').addEventListener('click', fetchJoke);
        fetchJoke(); // Initial load
    </script>
</body>
</html>
